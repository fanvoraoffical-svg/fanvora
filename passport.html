<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fan Passport | Fanvora</title>

<link rel="stylesheet" href="passport.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="passport-page">

<header>

<a href="dashboard.html" class="backBtn">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

<h1>

Fanvora Digital Passport

</h1>

</header>

<div class="passport-container">

<div class="passport-card">

<!-- LEFT -->

<div class="passport-left">

<img
src="assets/avatars/fan-avatar.png"
id="passportAvatar">

<h2 id="passportName">

Loading...

</h2>

<p id="passportSport">

Football Fan

</p>

</div>

<!-- RIGHT -->

<div class="passport-right">

<div class="logo">

<img
src="assets/logo/logo.png">

</div>

<div class="passport-grid">

<div>

<span>Passport ID</span>

<h3 id="passportId">

Loading...

</h3>

</div>

<div>

<span>Country</span>

<h3 id="passportCountry">

Loading...

</h3>

</div>

<div>

<span>Favourite Team</span>

<h3 id="passportTeam">

Loading...

</h3>

</div>

<div>

<span>Level</span>

<h3 id="passportLevel">

1

</h3>

</div>

<div>

<span>XP</span>

<h3 id="passportXP">

0 XP

</h3>

</div>

<div>

<span>Member Since</span>

<h3 id="memberSince">

2026

</h3>

</div>

</div>
<!-- QR SECTION -->

<div class="passport-bottom">

    <div class="qr-box">
    
    <img
    src="assets/passport/qr.png"
    id="passportQR"
    alt="QR Code">
    
    <p>
    
    Scan to verify Fan Passport
    
    </p>
    
    </div>
    
    <div class="passport-info">
    
    <h2>
    
    Where Fans Become Legends
    
    </h2>
    
    <p id="passportBio">
    
    Loading profile...
    
    </p>
    
    <div class="passport-buttons">
    
    <button id="downloadPassport">
    
    <i class="fa-solid fa-download"></i>
    
    Download PDF
    
    </button>
    
    <button id="sharePassport">
    
    <i class="fa-solid fa-share-nodes"></i>
    
    Share Passport
    
    </button>
    
    </div>
    
    </div>
    
    </div>
    
    </div>
    
    </div>
    
    <footer>
    
    <p>
    
    © 2026 Fanvora • Digital Fan Passport
    
    </p>
    
    </footer>
    
    </div>
    
    <script type="module" src="passport.js"></script>
    
    </body>
    
    </html>
